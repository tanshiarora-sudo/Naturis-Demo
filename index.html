<!DOCTYPE html>
<html lang="en">
<head>

  <title>Naturis · Sampling Platform</title>

  <!-- Google Fonts: Cormorant Garamond · Inter · JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />

  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>

  <!-- Tweaks panel (plain JS, registers before tokens) -->

  <!-- Design tokens -->
  <link rel="stylesheet" href="tokens.css?v=3" />

<body>
  <div id="root">
    <div style="height:100vh;display:flex;align-items:center;justify-content:center;font-family:Inter,sans-serif;color:#5A6470;flex-direction:column;gap:12px;">
      <div style="font-family:'Cormorant Garamond',serif;font-size:40px;color:#12395F;">Naturis</div>
      <div style="font-size:13px;letter-spacing:.08em;text-transform:uppercase;">Loading sampling platform…</div>
